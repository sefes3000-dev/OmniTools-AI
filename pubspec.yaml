name: omnitools_ai
description: The ultimate All-in-One production-ready Utilities application.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management & Routing
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Local Storage & Database
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.3

  # Networking & Connectivity
  dio: ^5.5.0+1
  connectivity_plus: ^6.0.3

  # UI & Media Components
  flutter_animate: ^4.5.0
  lottie: ^3.1.2
  cached_network_image: ^3.3.1
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  google_fonts: ^6.2.1

  # Monetization & Ads
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0

  # System & Utilities
  permission_handler: ^11.3.1
  path_provider: ^2.1.3
  package_info_plus: ^8.0.0
  device_info_plus: ^10.1.0
  url_launcher: ^6.3.0
  flutter_local_notifications: ^17.1.2
  local_auth: ^2.2.0
  crypto: ^3.0.3
  archive: ^3.6.1

  # File & Image Handling
  image_picker: ^1.1.2
  file_picker: ^8.0.5
  image: ^4.2.0
  pdf: ^3.10.8
  printing: ^5.13.1
  google_mlkit_text_recognition: ^0.13.0

  # Hardware Access
  torch_light: ^1.0.0
  flutter_compass: ^0.8.0
  battery_plus: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.10

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/animations/
    - assets/images/
